<svg viewBox="0 0 1080 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">

  <rect x="0" y="0" width="1080" height="500" fill="#0a0e14"/>

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#5ea8ff"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#a98fff"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#4dffb8"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#ffb84d"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#ff5d8f"/>
    </marker>
  </defs>

  <text x="540" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#8fe9ff">AI incident response workflow</text>
  <text x="540" y="52" text-anchor="middle" font-size="12" fill="#7a8496">From a typed description to a categorized, scored checklist</text>

  <!-- Incident description input node -->
  <rect x="30" y="150" width="170" height="86" rx="12" fill="none" stroke="#5ea8ff" stroke-width="2" filter="url(#glow)"/>
  <text x="115" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#cfe6ff">Incident description</text>
  <text x="115" y="200" text-anchor="middle" font-size="11" fill="#a9cdff">Typed by user —</text>
  <text x="115" y="215" text-anchor="middle" font-size="11" fill="#a9cdff">single or batch mode</text>

  <!-- Arrow: input -> Classify -->
  <path d="M200 193 L 268 193" stroke="#5ea8ff" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"
        stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="24;0" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Analysis engine bounding box -->
  <rect x="270" y="95" width="680" height="230" rx="14" fill="none" stroke="#a98fff" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>
  <text x="610" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#c9beff">Incident analysis engine</text>

  <!-- Classify type -->
  <rect x="290" y="153" width="190" height="90" rx="12" fill="none" stroke="#a98fff" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="385" y="183" text-anchor="middle" font-size="13" font-weight="600" fill="#e2d9ff">Classify type</text>
  <text x="385" y="201" text-anchor="middle" font-size="11" fill="#c9beff">Security, Infrastructure,</text>
  <text x="385" y="216" text-anchor="middle" font-size="11" fill="#c9beff">Financial, Application,</text>
  <text x="385" y="231" text-anchor="middle" font-size="11" fill="#c9beff">Data, or Integration</text>

  <!-- Arrow: Classify -> Score severity -->
  <path d="M480 198 L 538 198" stroke="#a98fff" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"
        stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="24;0" dur="1s" begin="2s" repeatCount="indefinite"/>
  </path>

  <!-- Score severity -->
  <rect x="540" y="153" width="190" height="90" rx="12" fill="none" stroke="#4dffb8" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="635" y="183" text-anchor="middle" font-size="13" font-weight="600" fill="#c9ffe9">Score severity</text>
  <text x="635" y="201" text-anchor="middle" font-size="11" fill="#8effda">Rates urgency as Low,</text>
  <text x="635" y="216" text-anchor="middle" font-size="11" fill="#8effda">Medium, High, or</text>
  <text x="635" y="231" text-anchor="middle" font-size="11" fill="#8effda">Critical</text>

  <!-- Arrow: Score -> Next steps -->
  <path d="M730 198 L 788 198" stroke="#4dffb8" stroke-width="2" fill="none" marker-end="url(#arrow-teal)"
        stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="24;0" dur="1s" begin="4s" repeatCount="indefinite"/>
  </path>

  <!-- Generate next steps -->
  <rect x="790" y="153" width="140" height="90" rx="12" fill="none" stroke="#ffb84d" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="4s" repeatCount="indefinite"/>
  </rect>
  <text x="860" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#ffe9c9">Generate</text>
  <text x="860" y="201" text-anchor="middle" font-size="11" fill="#ffdba8">next steps</text>
  <text x="860" y="219" text-anchor="middle" font-size="11" fill="#ffdba8">Checklist +</text>
  <text x="860" y="234" text-anchor="middle" font-size="11" fill="#ffdba8">summary</text>

  <!-- Arrow: Next steps -> History log (down) -->
  <path d="M860 243 L 860 275" stroke="#ff5d8f" stroke-width="2" fill="none" marker-end="url(#arrow-pink)"
        stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="6s" repeatCount="indefinite"/>
  </path>

  <!-- History log node -->
  <rect x="765" y="279" width="190" height="46" rx="10" fill="none" stroke="#ff5d8f" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="6s" repeatCount="indefinite"/>
  </rect>
  <text x="860" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#ffd6e3">Logged to history</text>
  <text x="860" y="313" text-anchor="middle" font-size="10" fill="#ffb3ce">every analysis saved</text>

  <!-- Arrow: Next steps -> Output (down and left to output box) -->
  <path d="M860 243 L 860 260 Q 860 270 850 270 L 230 270 Q 220 270 220 280 L 220 328"
        stroke="#ffb84d" stroke-width="2" fill="none" marker-end="url(#arrow-amber)" stroke-dasharray="8 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="90;0" dur="1.6s" begin="6s" repeatCount="indefinite"/>
  </path>

  <!-- Output node -->
  <rect x="100" y="332" width="240" height="86" rx="12" fill="none" stroke="#9aa0b0" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke" values="#9aa0b0;#4dffb8;#9aa0b0" keyTimes="0;0.5;1" dur="6s" begin="6s" repeatCount="indefinite"/>
  </rect>
  <text x="220" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#d6dae0">Results shown to user</text>
  <text x="220" y="382" text-anchor="middle" font-size="11" fill="#a9aeb8">Category, severity,</text>
  <text x="220" y="398" text-anchor="middle" font-size="11" fill="#a9aeb8">checklist, and summary</text>

  <!-- Legend -->
  <g transform="translate(60,455)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="none" stroke="#5ea8ff" stroke-width="1.5"/>
    <text x="20" y="11" font-size="11" fill="#9aa0b0">Input</text>
    <rect x="110" y="0" width="14" height="14" rx="3" fill="none" stroke="#a98fff" stroke-width="1.5"/>
    <text x="130" y="11" font-size="11" fill="#9aa0b0">Classification</text>
    <rect x="270" y="0" width="14" height="14" rx="3" fill="none" stroke="#4dffb8" stroke-width="1.5"/>
    <text x="290" y="11" font-size="11" fill="#9aa0b0">Severity scoring</text>
    <rect x="440" y="0" width="14" height="14" rx="3" fill="none" stroke="#ffb84d" stroke-width="1.5"/>
    <text x="460" y="11" font-size="11" fill="#9aa0b0">Checklist</text>
    <rect x="570" y="0" width="14" height="14" rx="3" fill="none" stroke="#ff5d8f" stroke-width="1.5"/>
    <text x="590" y="11" font-size="11" fill="#9aa0b0">History log</text>
    <rect x="700" y="0" width="14" height="14" rx="3" fill="none" stroke="#9aa0b0" stroke-width="1.5"/>
    <text x="720" y="11" font-size="11" fill="#9aa0b0">Output</text>
  </g>

</svg>
